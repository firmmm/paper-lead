# Paper Lead Configuration

sources:
  arxiv:
    categories:
      - cs.AI
      - cs.CL
      - cs.LG
    max_results: 50

  huggingface:
    daily_papers: true
    max_results: 30

interests:
  - LLM efficiency & quantization
  - RAG & retrieval
  - Thai NLP
  - Agent frameworks
  - Evaluation & benchmarking
  - Fine-tuning & PEFT
  - Multimodal models

# Relevance threshold (0-1)
min_score: 0.5

# LLM for summarization
llm:
  provider: openai
  model: GEMMA-4
  base_url: https://gateway-llm.siam.ai

# Digest output
digest:
  format: markdown
  output_dir: digest/

# Delivery
delivery:
  # slack:
  #   webhook: https://hooks.slack.com/...
  # discord:
  #   webhook: https://discord.com/api/webhooks/...
  file: true

# SQLite for history (dedup)
database: data/paper_lead.sqlite3
